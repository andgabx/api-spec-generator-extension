<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 13px;
    }
    h2 { margin-bottom: 8px; font-size: 15px; color: #89b4fa; }
    p  { color: #a6adc8; line-height: 1.5; }
    .tip {
      margin-top: 12px;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #6c7086;
    }
    .tip strong { color: #cdd6f4; }
  </style>
</head>
<body>
  <h2>⚡ API Spec Generator</h2>
  <p>Open <strong>DevTools</strong> (F12) and select the <strong>"API Spec"</strong> tab.</p>
  <div class="tip">
    <strong>How to use:</strong> Browse the page you want to document. Endpoints are captured automatically in real time.
  </div>
</body>
</html>
